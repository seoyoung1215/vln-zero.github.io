# TEST LAYOUT: .glb under SCENES_DIR (same rules as ansr_gibson: episode ids are
# ``gibson/<Scene>/<Scene>.glb``, so SCENES_DIR is usually the **scene_datasets** parent,
# e.g. ``.../gibson_glb_only/`` only if your tree is ``gibson_glb_only/gibson/Scene/Scene.glb``).
# Matching ``<stem>.navmesh`` files under NAVMESH_DIR (SplitNavmeshEnv in my_agent).

ENVIRONMENT:
  MAX_EPISODE_STEPS: 500

SIMULATOR:
  ACTION_SPACE_CONFIG: v0
  AGENT_0:
    SENSORS: [RGB_SENSOR, DEPTH_SENSOR]
  FORWARD_STEP_SIZE: 1.0
  TURN_ANGLE: 30
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
    ALLOW_SLIDING: True
  RGB_SENSOR:
    WIDTH: 512
    HEIGHT: 512
    HFOV: 90
    TYPE: HabitatSimRGBSensor
    POSITION: [0, 1.25, 0]
  DEPTH_SENSOR:
    WIDTH: 512
    HEIGHT: 512
    MIN_DEPTH: 0.0
    MAX_DEPTH: 10.0
    NORMALIZE_DEPTH: False
    HFOV: 90
    TYPE: HabitatSimDepthSensor
    POSITION: [0, 1.25, 0]

TASK:
  TYPE: VLN-v0
  SUCCESS_DISTANCE: 1.0
  SENSORS: [
    INSTRUCTION_SENSOR,
    SHORTEST_PATH_SENSOR,
    VLN_ORACLE_PROGRESS_SENSOR
  ]
  INSTRUCTION_SENSOR_UUID: instruction
  POSSIBLE_ACTIONS: [STOP, MOVE_FORWARD, TURN_LEFT, TURN_RIGHT]
  MEASUREMENTS: [
    TOP_DOWN_MAP_VLNCE,
    DISTANCE_TO_GOAL,
    SUCCESS,
    SPL,
    PATH_LENGTH,
    ORACLE_SUCCESS,
    STEPS_TAKEN,
    COLLISIONS
  ]
  SUCCESS:
    SUCCESS_DISTANCE: 1.0
  SPL:
    SUCCESS_DISTANCE: 1.0

DATASET:
  TYPE: VLN-CE-v1
  SPLIT: all
  DATA_PATH: VLN_CE/data/datasets/ANSR_V1/{split}/{split}.json.gz
  SCENES_DIR: VLN_CE/data/scene_datasets/gibson_glb_only/
  # Flat navmeshes: ``<NAVMESH_DIR>/<Scene>.navmesh`` (Scene = basename without .glb)
  NAVMESH_DIR: VLN_CE/data/scene_datasets/gibson_navmeshes_only/
